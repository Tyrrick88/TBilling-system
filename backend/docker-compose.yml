services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tbilling
      POSTGRES_USER: tbilling
      POSTGRES_PASSWORD: tbilling
    ports:
      - "5432:5432"
    volumes:
      - tbilling-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tbilling -d tbilling"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/tbilling
      DATABASE_USERNAME: tbilling
      DATABASE_PASSWORD: tbilling
      REDIS_HOST: redis
      JWT_SECRET: replace-with-a-long-production-secret
      TBILLING_SUPER_ADMIN_EMAIL: owner@tbilling.local
      TBILLING_SUPER_ADMIN_PASSWORD: ChangeMe123!
    ports:
      - "8080:8080"

volumes:
  tbilling-postgres:
